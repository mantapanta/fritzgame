<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f0d">
    <meta name="description" content="Next-Gen Free Kick Simulator – Freistoß-Simulator mit Effet, Powershots und divendem Torwart.">
    <title>Next-Gen Free Kick Simulator</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            padding: 0;
            background: #0a0f0d;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #ui-layer {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            gap: 10px;
            width: 90vw;
            max-width: 600px;
            z-index: 10;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        #score { color: #4caf50; }
        #best { color: #ffcc00; }
        #gameCanvas {
            background: #143d14;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 16px;
            width: min(95vw, 600px);
            aspect-ratio: 600 / 750;
            max-height: 72vh;
            display: block;
        }
        #controls {
            display: flex;
            gap: 12px;
            width: min(95vw, 600px);
            margin-top: 15px;
            z-index: 10;
        }
        .btn {
            flex: 1;
            padding: 16px 5px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(145deg, #222, #333);
            color: #aaa;
            border: 1px solid #444;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.2s ease, box-shadow 0.2s ease, color 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.96); }
        .selected {
            background: linear-gradient(145deg, #00b4db, #0083b0);
            color: white;
            border-color: #00b4db;
            box-shadow: 0 0 15px rgba(0,180,219,0.4);
        }
        #popups {
            position: absolute;
            font-size: clamp(32px, 9vw, 48px);
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 100;
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-popup { transform: scale(1) !important; }
        #hint {
            position: absolute;
            bottom: max(90px, calc(env(safe-area-inset-bottom) + 90px));
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            z-index: 5;
            pointer-events: none;
            text-align: center;
            width: 90vw;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud-box">TORE: <span id="score">0</span></div>
        <div class="hud-box">BEST: <span id="best">0</span></div>
        <div class="hud-box">VERSUCHE: <span id="attempts">0</span></div>
    </div>

    <div id="popups">TOR!</div>
    <div id="hint">Tippe auf das Spielfeld zum Schießen</div>

    <canvas id="gameCanvas" width="600" height="750"></canvas>

    <div id="controls">
        <button class="btn" id="btn-left" type="button">↩️ Effet Links</button>
        <button class="btn selected" id="btn-straight" type="button">⚡ Powershot</button>
        <button class="btn" id="btn-right" type="button">↪️ Effet Rechts</button>
    </div>

    <script>
    (function () {
        'use strict';

        // ---- Logische Auflösung (unabhängig von der Displaygröße) ----
        const W = 600, H = 750;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const attemptsDisplay = document.getElementById('attempts');
        const popup = document.getElementById('popups');
        const hint = document.getElementById('hint');

        // High-DPI-Setup: gestochen scharf auf Retina/Mobil, ohne den Rest zu skalieren.
        function setupCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3);
            canvas.width = Math.round(W * dpr);
            canvas.height = Math.round(H * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // ---- Spielzustand ----
        let score = 0;
        let attempts = 0;
        let best = 0;
        try { best = parseInt(localStorage.getItem('fk_best') || '0', 10) || 0; } catch (e) {}
        bestDisplay.textContent = best;

        let isShooting = false;
        let shotType = 'straight';
        let resultShown = false;

        const goal = { x: 120, y: 80, width: 360, height: 90 };

        let ball, player, keeper, target, trail;

        function resetEntities() {
            ball = { x: 300, y: 620, radius: 14, vx: 0, vy: 0, scale: 1, rotation: 0 };
            player = { x: 240, y: 640, frame: 0 };
            keeper = { x: 300, y: 150, vx: 2.5, diveTarget: 300, diving: false };
            target = { x: 300, y: 110, vx: 4.5 };
            trail = [];
        }
        resetEntities();

        // ---- Vorberechnete Zuschauerränge (kein Math.random pro Frame mehr) ----
        const crowd = [];
        for (let i = 0; i < W; i += 12) {
            crowd.push({ x: i, shade: ((i * 2654435761) >>> 8) % 2 === 0 ? '#111' : '#222' });
        }
        let flashes = []; // Kamerablitze der Zuschauer

        // ---- Gecachter Rasen-Farbverlauf ----
        const fieldGrad = ctx.createLinearGradient(0, 0, 0, H);
        fieldGrad.addColorStop(0, '#0d3a0d');
        fieldGrad.addColorStop(0.3, '#144d14');
        fieldGrad.addColorStop(1, '#1e6b1e');

        // ---- Sound (Web Audio, erst nach erster Nutzerinteraktion) ----
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
        }
        function tone(freq, dur, type, vol, slideTo) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type || 'sine';
            osc.frequency.setValueAtTime(freq, t);
            if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
            gain.gain.setValueAtTime(vol || 0.2, t);
            gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + dur);
        }
        const sfx = {
            kick:  () => tone(180, 0.12, 'triangle', 0.35, 90),
            goal:  () => { tone(523, 0.15, 'square', 0.22); setTimeout(() => tone(784, 0.25, 'square', 0.22), 120); },
            save:  () => tone(300, 0.2, 'sawtooth', 0.2, 140),
            miss:  () => tone(220, 0.3, 'sine', 0.2, 110)
        };

        // ---- Steuerung ----
        function setShot(type) {
            if (isShooting) return;
            shotType = type;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn-' + type).classList.add('selected');
        }
        document.getElementById('btn-left').addEventListener('click', () => setShot('left'));
        document.getElementById('btn-straight').addEventListener('click', () => setShot('straight'));
        document.getElementById('btn-right').addEventListener('click', () => setShot('right'));

        function schiessen() {
            initAudio();
            if (isShooting || ball.y < 620) return;
            isShooting = true;
            resultShown = false;
            attempts++;
            attemptsDisplay.textContent = attempts;
            hint.style.opacity = '0';

            const targetX = target.x;
            const distanceY = 620 - target.y;
            const speedFactor = shotType === 'straight' ? 1.3 : 1.0;
            ball.vy = -(distanceY / 22) * speedFactor;
            ball.vx = ((targetX - ball.x) / 22) * speedFactor;

            // Torwart entscheidet sich für eine Ecke (mit Fehlerchance -> fair schlagbar).
            const guessError = (((attempts * 2654435761) >>> 11) % 240) - 120;
            keeper.diveTarget = Math.max(goal.x + 30, Math.min(goal.x + goal.width - 30, targetX + guessError));
            keeper.diving = true;
            sfx.kick();
        }

        canvas.addEventListener('mousedown', schiessen);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); schiessen(); }, { passive: false });

        // ---- Update-Logik ----
        function update() {
            if (!isShooting) {
                // Fadenkreuz bewegen
                target.x += target.vx;
                if (target.x < goal.x + 20 || target.x > goal.x + goal.width - 20) target.vx *= -1;
                // Torwart patrouilliert
                keeper.x += keeper.vx;
                if (keeper.x < goal.x + 40 || keeper.x > goal.x + goal.width - 40) keeper.vx *= -1;
            } else {
                // Anlauf des Spielers
                if (player.y > ball.y + 10) {
                    player.x += (ball.x - 20 - player.x) * 0.2;
                    player.y += (ball.y + 5 - player.y) * 0.2;
                    player.frame += 0.5;
                } else {
                    // Ball fliegt
                    ball.x += ball.vx;
                    ball.y += ball.vy;
                    if (shotType === 'left') ball.vx -= 0.22;
                    if (shotType === 'right') ball.vx += 0.22;
                    if (ball.scale > 0.45) ball.scale -= 0.015;
                    ball.rotation += 0.2 + Math.abs(ball.vx) * 0.02;

                    trail.push({ x: ball.x, y: ball.y, s: ball.scale });
                    if (trail.length > 12) trail.shift();

                    // Torwart hechtet zur gewählten Ecke
                    if (keeper.diving) keeper.x += (keeper.diveTarget - keeper.x) * 0.18;

                    if (ball.y <= goal.y + goal.height && !resultShown) checkResult();
                }
            }

            // Kamerablitze aktualisieren (1 Random-Check/Frame statt ~50)
            if (Math.random() > 0.9) {
                flashes.push({ x: Math.random() * W, life: 1 });
            }
            for (let i = flashes.length - 1; i >= 0; i--) {
                flashes[i].life -= 0.06;
                if (flashes[i].life <= 0) flashes.splice(i, 1);
            }
        }

        function checkResult() {
            resultShown = true;
            isShooting = false;
            const insideGoal = (ball.x > goal.x && ball.x < goal.x + goal.width);
            const keeperIntercept = Math.abs(ball.x - keeper.x) < 38;

            if (!insideGoal) {
                triggerPopup('VORBEI!', '#aaa');
                sfx.miss();
                score = 0; // Serie zurücksetzen
            } else if (keeperIntercept) {
                triggerPopup('GEHALTEN!', '#ff9800');
                sfx.save();
                score = 0;
            } else {
                triggerPopup('TOR!', '#4caf50');
                sfx.goal();
                score++;
                if (score > best) {
                    best = score;
                    bestDisplay.textContent = best;
                    try { localStorage.setItem('fk_best', String(best)); } catch (e) {}
                }
            }
            scoreDisplay.textContent = score;
            setTimeout(resetRound, 1500);
        }

        function triggerPopup(text, color) {
            popup.textContent = text;
            popup.style.color = color;
            popup.classList.add('show-popup');
        }

        function resetRound() {
            popup.classList.remove('show-popup');
            resetEntities();
        }

        // ---- Rendering ----
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Rasen
            ctx.fillStyle = fieldGrad;
            ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 15; i++) {
                ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)';
                ctx.fillRect(0, 100 + i * 45, W, 40);
            }

            // Zuschauerränge (statisch)
            ctx.fillStyle = '#05140f';
            ctx.fillRect(0, 0, W, 100);
            for (let c = 0; c < crowd.length; c++) {
                ctx.fillStyle = crowd[c].shade;
                ctx.fillRect(crowd[c].x, 20, 10, 60);
            }
            // Kamerablitze
            for (let i = 0; i < flashes.length; i++) {
                ctx.fillStyle = 'rgba(255,255,255,' + (flashes[i].life * 0.8) + ')';
                ctx.beginPath();
                ctx.arc(flashes[i].x, 40, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Strafraum-Linien
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 3;
            ctx.strokeRect(60, 100, 480, 220);
            ctx.strokeRect(180, 100, 240, 70);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath(); ctx.arc(300, 260, 4, 0, Math.PI * 2); ctx.fill();

            // Tor + Netz
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fillRect(goal.x, goal.y, goal.width, goal.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = goal.x; x <= goal.x + goal.width; x += 10) {
                ctx.moveTo(x, goal.y); ctx.lineTo(x, goal.y + goal.height);
            }
            for (let y = goal.y; y <= goal.y + goal.height; y += 10) {
                ctx.moveTo(goal.x, y); ctx.lineTo(goal.x + goal.width, y);
            }
            ctx.stroke();

            // Pfosten
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(goal.x, goal.y + goal.height);
            ctx.lineTo(goal.x, goal.y);
            ctx.lineTo(goal.x + goal.width, goal.y);
            ctx.lineTo(goal.x + goal.width, goal.y + goal.height);
            ctx.stroke();

            // Zielkreuz
            if (!isShooting) {
                ctx.strokeStyle = '#ff0055';
                ctx.shadowColor = '#ff0055';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(target.x, target.y, 15, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Torwart
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(keeper.x - 18, keeper.y, 36, 45);
            ctx.fillStyle = '#111';
            ctx.fillRect(keeper.x - 18, keeper.y + 45, 36, 15);
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath(); ctx.arc(keeper.x, keeper.y - 12, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.fillRect(keeper.x - 28, keeper.y + 5, 10, 10);
            ctx.fillRect(keeper.x + 18, keeper.y + 5, 10, 10);

            // Spieler
            const bob = Math.sin(player.frame) * 3;
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 16, player.y + bob, 32, 45);
            ctx.fillStyle = '#0a192f';
            ctx.fillRect(player.x - 16, player.y + 45 + bob, 32, 15);
            ctx.fillStyle = '#ffdbac';
            ctx.beginPath(); ctx.arc(player.x, player.y - 12 + bob, 10, 0, Math.PI * 2); ctx.fill();

            // Ball-Trail
            for (let i = 0; i < trail.length; i++) {
                const tp = trail[i];
                ctx.fillStyle = 'rgba(255,255,255,' + (i / trail.length * 0.25) + ')';
                ctx.beginPath();
                ctx.arc(tp.x, tp.y, ball.radius * tp.s * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }

            // Ball-Schatten
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            const shadowY = 620 - (620 - ball.y) * 0.1;
            ctx.beginPath();
            ctx.arc(ball.x + 8, shadowY, ball.radius * ball.scale, 0, Math.PI * 2);
            ctx.fill();

            // Ball (mit angewandter Rotation)
            ctx.save();
            ctx.translate(ball.x, ball.y);
            ctx.scale(ball.scale, ball.scale);
            ctx.rotate(ball.rotation);
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
            for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
                ctx.fillRect(Math.cos(a) * 8 - 2, Math.sin(a) * 8 - 2, 4, 4);
            }
            ctx.restore();
        }

        // ---- Haupt-Loop (eine einzige rAF-Schleife) ----
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
