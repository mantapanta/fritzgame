<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f0d">
    <meta name="description" content="Street Striker – dribble frei über den Platz und triff aus der Bewegung. FC-Mobile-artiges Web-Fußballspiel.">
    <title>Street Striker – Dribble & Score</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0; padding: 0;
            background: #06110b;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; min-height: 100dvh;
            color: #fff; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        #wrap {
            position: relative;
            width: min(100vw, 600px);
            aspect-ratio: 600 / 800;
            max-height: 100dvh;
        }
        #gameCanvas {
            width: 100%; height: 100%; display: block;
            background: #0c2f14;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        #ui-layer {
            position: absolute; top: max(12px, env(safe-area-inset-top));
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10; pointer-events: none;
            width: 94%; justify-content: space-between;
        }
        .hud-box {
            background: rgba(0,0,0,0.55);
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            font-weight: bold; font-size: 15px; letter-spacing: 1px; white-space: nowrap;
        }
        #score { color: #38e06a; }
        #best  { color: #ffcc00; }
        #popups {
            position: absolute; top: 34%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(34px, 10vw, 60px); font-weight: 900;
            text-shadow: 0 6px 18px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .show-popup { transform: translate(-50%,-50%) scale(1) !important; }
        #hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: rgba(255,255,255,0.55);
            z-index: 5; pointer-events: none; text-align: center; width: 90%;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="ui-layer">
            <div class="hud-box">TORE <span id="score">0</span></div>
            <div class="hud-box">BEST <span id="best">0</span></div>
            <div class="hud-box">SCHÜSSE <span id="attempts">0</span></div>
        </div>
        <div id="popups">TOR!</div>
        <div id="hint">Linke Hälfte: Joystick zum Laufen & Dribbeln · Rechts: SCHUSS / SPRINT</div>
    </div>

    <script>
    (function () {
        'use strict';

        // ===== Canvas / Perspektive =====
        const CW = 600, CH = 800;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const attemptsEl = document.getElementById('attempts');
        const popup = document.getElementById('popups');
        const hint = document.getElementById('hint');

        function setupCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3);
            canvas.width = Math.round(CW * dpr);
            canvas.height = Math.round(CH * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // Weltmaße: y=0 = Torlinie (fern/oben), y=FH = nah/unten
        const FW = 600, FH = 900;
        const TOP = 70;                 // Bildschirm-Rand oben (Ränge)
        const FIELD_H = CH - TOP;       // Feldhöhe am Screen
        const TOPHALF = 175, BOTHALF = 300; // halbe Feldbreite (Trapez) fern/nah
        const lerp = (a, b, t) => a + (b - a) * t;

        function project(wx, wy) {
            const t = wy / FH;
            const hw = lerp(TOPHALF, BOTHALF, t);
            return {
                sx: CW / 2 + (wx / FW - 0.5) * 2 * hw,
                sy: TOP + t * FIELD_H,
                sc: lerp(0.55, 1.18, t),
                t: t
            };
        }

        // Tor (Weltkoordinaten)
        const GOAL_L = 205, GOAL_R = 395, GOAL_CX = 300, KEEPER_LINE = 30;

        // ===== Zustand =====
        let score = 0, attempts = 0, best = 0;
        try { best = parseInt(localStorage.getItem('ss_best') || '0', 10) || 0; } catch (e) {}
        bestEl.textContent = best;

        let phase = 'play';   // 'play' (dribbeln) | 'shot' | 'result'

        const KSPEED = 5.2;   // max. horizontales Tempo des Torwarts
        const KREACH = 34;    // Reichweite (Hände) beim Hechten
        let player, ball, keeper, facing;
        function reset() {
            player = { x: 300, y: 720, run: 0, vx: 0, vy: 0 };
            ball = { x: 320, y: 700, vx: 0, vy: 0, spin: 0, spinDraw: 0 };
            keeper = { x: GOAL_CX, dive: GOAL_CX, diving: false, react: 0, lean: 0 };
            facing = { x: 0, y: -1 };
            phase = 'play';
        }
        reset();

        // ===== vorberechnete Ränge =====
        const crowd = [];
        for (let i = 0; i < CW; i += 10) crowd.push({ x: i, c: ((i * 2654435761) >>> 9) % 3 });
        const crowdCols = ['#12202b', '#1a2b1f', '#241a24'];
        let flashes = [];

        // ===== Sound =====
        let ac = null;
        function initAudio() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
        function tone(f, d, type, v, to) {
            if (!ac) return;
            const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
            o.type = type || 'sine'; o.frequency.setValueAtTime(f, t);
            if (to) o.frequency.exponentialRampToValueAtTime(to, t + d);
            g.gain.setValueAtTime(v || 0.2, t); g.gain.exponentialRampToValueAtTime(0.0001, t + d);
            o.connect(g).connect(ac.destination); o.start(t); o.stop(t + d);
        }
        const sfx = {
            kick: () => tone(190, 0.11, 'triangle', 0.32, 95),
            goal: () => { tone(523, 0.14, 'square', 0.22); setTimeout(() => tone(784, 0.24, 'square', 0.22), 110); },
            save: () => tone(300, 0.18, 'sawtooth', 0.2, 150),
            miss: () => tone(210, 0.28, 'sine', 0.2, 110)
        };

        // ===== Eingaben (Tastatur für Desktop/Test) =====
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') { e.preventDefault(); shoot(); }
        });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // ===== Touch: floating Joystick (links) + Buttons (rechts) =====
        let joy = { active: false, id: null, bx: 0, by: 0, dx: 0, dy: 0, mag: 0 };
        let sprintHeld = false;
        const shootBtn = { x: CW - 92, y: CH - 96, r: 58 };
        const sprintBtn = { x: CW - 150, y: CH - 210, r: 42, id: null };

        function toLocal(t) {
            const r = canvas.getBoundingClientRect();
            return { x: (t.clientX - r.left) / r.width * CW, y: (t.clientY - r.top) / r.height * CH };
        }
        function inBtn(p, b) { return Math.hypot(p.x - b.x, p.y - b.y) <= b.r; }

        canvas.addEventListener('touchstart', e => {
            initAudio();
            for (const t of e.changedTouches) {
                const p = toLocal(t);
                if (inBtn(p, shootBtn)) { shoot(); continue; }
                if (inBtn(p, sprintBtn)) { sprintHeld = true; sprintBtn.id = t.identifier; continue; }
                if (!joy.active && p.x < CW * 0.58) {
                    joy.active = true; joy.id = t.identifier; joy.bx = p.x; joy.by = p.y; joy.dx = 0; joy.dy = 0; joy.mag = 0;
                }
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === joy.id) {
                    const p = toLocal(t);
                    let dx = p.x - joy.bx, dy = p.y - joy.by;
                    const d = Math.hypot(dx, dy), R = 70;
                    joy.mag = Math.min(1, d / R);
                    if (d > 0) { joy.dx = dx / d; joy.dy = dy / d; }
                }
            }
            e.preventDefault();
        }, { passive: false });

        function endTouch(e) {
            for (const t of e.changedTouches) {
                if (t.identifier === joy.id) { joy.active = false; joy.id = null; joy.mag = 0; joy.dx = 0; joy.dy = 0; }
                if (t.identifier === sprintBtn.id) { sprintHeld = false; sprintBtn.id = null; }
            }
        }
        canvas.addEventListener('touchend', endTouch);
        canvas.addEventListener('touchcancel', endTouch);
        canvas.addEventListener('mousedown', e => { initAudio(); const p = toLocal(e); if (inBtn(p, shootBtn)) shoot(); });

        function inputVector() {
            if (joy.active && joy.mag > 0.08) return { x: joy.dx, y: joy.dy, mag: joy.mag };
            let x = 0, y = 0;
            if (keys['arrowleft'] || keys['a']) x -= 1;
            if (keys['arrowright'] || keys['d']) x += 1;
            if (keys['arrowup'] || keys['w']) y -= 1;
            if (keys['arrowdown'] || keys['s']) y += 1;
            const d = Math.hypot(x, y);
            if (d > 0) return { x: x / d, y: y / d, mag: 1 };
            return { x: 0, y: 0, mag: 0 };
        }

        function hasBall() {
            return phase === 'play' && Math.hypot(player.x - ball.x, player.y - ball.y) < 46;
        }

        function shoot() {
            initAudio();
            if (phase !== 'play' || !hasBall()) return;
            phase = 'shot';
            attempts++; attemptsEl.textContent = attempts;
            hint.style.opacity = '0';

            const iv = inputVector();
            const aimX = Math.max(GOAL_L + 6, Math.min(GOAL_R - 6, GOAL_CX + iv.x * 74));
            let dx = aimX - ball.x, dy = 0 - ball.y;
            const d = Math.hypot(dx, dy) || 1;
            const SPEED = 14;
            ball.vx = dx / d * SPEED;
            ball.vy = dy / d * SPEED;
            ball.spin = iv.x * 0.08;

            // Torwart liest den Schuss und legt sich auf eine Ecke fest
            // (wie in echt). Trifft er die Ecke -> Parade; platzierst du in die
            // andere Ecke -> Tor. Reaktionszeit + Tempolimit machen ihn zusätzlich
            // aus spitzem Winkel schlagbar.
            const tHit = (ball.y - KEEPER_LINE) / (-ball.vy);
            const predX = ball.x + ball.vx * tHit;
            const err = (((attempts * 2654435761) >>> 12) % 100) - 50;   // ±50 Leseungenauigkeit
            keeper.dive = Math.max(GOAL_L - 14, Math.min(GOAL_R + 14, predX + err));
            keeper.diving = true;
            keeper.react = 6;   // Frames Reaktionszeit
            sfx.kick();
        }

        // ===== Update =====
        function update() {
            const iv = inputVector();

            if (phase === 'play') {
                // Spieler mit Trägheit/Momentum (beschleunigt & gleitet)
                const sprint = (sprintHeld || keys['shift']) ? 1.62 : 1;
                const maxSp = 4.3 * sprint * iv.mag;
                const tvx = iv.x * maxSp, tvy = iv.y * maxSp;
                player.vx += (tvx - player.vx) * 0.16;
                player.vy += (tvy - player.vy) * 0.16;
                player.x += player.vx; player.y += player.vy;
                const spd = Math.hypot(player.vx, player.vy);
                if (spd > 0.35) { facing.x = player.vx / spd; facing.y = player.vy / spd; player.run += spd * 0.13; }
                player.x = Math.max(24, Math.min(FW - 24, player.x));
                player.y = Math.max(KEEPER_LINE + 20, Math.min(FH - 24, player.y));

                // Dribbling mit losem Kontakt: bei Tempo wird der Ball weiter
                // vorgelegt (schwerer zu kontrollieren). Ball hat eigene Reibung.
                const DR = 22 + spd * 3.2;
                const grip = spd > 6 ? 0.22 : 0.3;
                ball.vx += ((player.x + facing.x * DR) - ball.x) * grip;
                ball.vy += ((player.y + facing.y * DR) - ball.y) * grip;
                ball.vx *= 0.55; ball.vy *= 0.55;   // Dämpfung -> weiches Führen
                ball.x += ball.vx; ball.y += ball.vy;
                ball.spinDraw += spd * 0.08 + 0.05;

                // Torwart hält aktiv die Winkel, spiegelt Ballposition gedämpft
                const idle = GOAL_CX + Math.sin(player.run * 0.08 + attempts) * 40;
                const target = Math.max(GOAL_L + 12, Math.min(GOAL_R - 12, ball.x * 0.34 + idle * 0.66));
                keeper.x += (target - keeper.x) * 0.07;
                keeper.lean *= 0.85;
            } else if (phase === 'shot') {
                // Ballflug: Kurve (Magnus), Luft-/Rollreibung
                ball.vx += ball.spin * 0.14; ball.spin *= 0.98;
                ball.vx *= 0.992; ball.vy *= 0.992;
                ball.x += ball.vx; ball.y += ball.vy;
                ball.spinDraw += 0.42;

                // Torwart hechtet zur festgelegten Ecke – begrenzt durch sein Tempo
                if (keeper.react > 0) { keeper.react--; }
                else {
                    const dxk = keeper.dive - keeper.x;
                    const step = Math.max(-KSPEED, Math.min(KSPEED, dxk));
                    keeper.x += step;
                    keeper.lean += (Math.sign(dxk) - keeper.lean) * 0.2;
                }

                if (ball.y <= 44 && ball.y > 0 && Math.abs(ball.x - keeper.x) < KREACH) resolve('GEHALTEN!', '#ff9800', 'save');
                else if (ball.y <= 4) {
                    if (ball.x > GOAL_L && ball.x < GOAL_R) resolve('TOR!', '#38e06a', 'goal');
                    else resolve('VORBEI!', '#bbb', 'miss');
                } else if (ball.x < -20 || ball.x > FW + 20) resolve('VORBEI!', '#bbb', 'miss');
            }

            if (Math.random() > 0.9) flashes.push({ x: Math.random() * CW, life: 1 });
            for (let i = flashes.length - 1; i >= 0; i--) { flashes[i].life -= 0.06; if (flashes[i].life <= 0) flashes.splice(i, 1); }
        }

        function resolve(text, color, kind) {
            if (phase === 'result') return;
            phase = 'result';
            popup.textContent = text; popup.style.color = color; popup.classList.add('show-popup');
            if (sfx[kind]) sfx[kind]();
            if (kind === 'goal') {
                score++;
                if (score > best) { best = score; bestEl.textContent = best; try { localStorage.setItem('ss_best', String(best)); } catch (e) {} }
            } else { score = 0; }
            scoreEl.textContent = score;
            setTimeout(() => { popup.classList.remove('show-popup'); reset(); }, 1400);
        }

        // ===== Rendering =====
        function pitchX(t, side) { return CW / 2 + side * lerp(TOPHALF, BOTHALF, t); }

        function drawShadow(p) {
            ctx.fillStyle = 'rgba(0,0,0,0.28)';
            ctx.beginPath(); ctx.ellipse(p.sx, p.sy + 2, 12 * p.sc, 5 * p.sc, 0, 0, 7); ctx.fill();
        }
        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // Ränge
            ctx.fillStyle = '#06100a'; ctx.fillRect(0, 0, CW, TOP);
            for (let i = 0; i < crowd.length; i++) { ctx.fillStyle = crowdCols[crowd[i].c]; ctx.fillRect(crowd[i].x, 14, 9, TOP - 22); }
            for (let i = 0; i < flashes.length; i++) { ctx.fillStyle = 'rgba(255,255,255,' + flashes[i].life * 0.8 + ')'; ctx.beginPath(); ctx.arc(flashes[i].x, TOP - 34, 3, 0, 7); ctx.fill(); }

            // Rasen-Trapez + perspektivische Streifen
            const bands = 11;
            for (let b = 0; b < bands; b++) {
                const t0 = b / bands, t1 = (b + 1) / bands;
                const y0 = TOP + t0 * FIELD_H, y1 = TOP + t1 * FIELD_H;
                ctx.fillStyle = b % 2 === 0 ? '#1b6b25' : '#166021';
                ctx.beginPath();
                ctx.moveTo(pitchX(t0, -1), y0); ctx.lineTo(pitchX(t0, 1), y0);
                ctx.lineTo(pitchX(t1, 1), y1); ctx.lineTo(pitchX(t1, -1), y1); ctx.closePath(); ctx.fill();
            }
            // Seitenlinien
            ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pitchX(0, -1), TOP); ctx.lineTo(pitchX(1, -1), CH);
            ctx.moveTo(pitchX(0, 1), TOP); ctx.lineTo(pitchX(1, 1), CH);
            ctx.moveTo(pitchX(0, -1), TOP); ctx.lineTo(pitchX(0, 1), TOP);
            ctx.stroke();

            // Strafraum
            const bl0 = project(150, 0), br0 = project(450, 0), bl1 = project(150, 260), br1 = project(450, 260);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(bl0.sx, bl0.sy); ctx.lineTo(bl1.sx, bl1.sy); ctx.lineTo(br1.sx, br1.sy); ctx.lineTo(br0.sx, br0.sy); ctx.stroke();
            const fl0 = project(240, 0), fr0 = project(360, 0), fl1 = project(240, 95), fr1 = project(360, 95);
            ctx.beginPath();
            ctx.moveTo(fl0.sx, fl0.sy); ctx.lineTo(fl1.sx, fl1.sy); ctx.lineTo(fr1.sx, fr1.sy); ctx.lineTo(fr0.sx, fr0.sy); ctx.stroke();
            const pen = project(300, 180);
            ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(pen.sx, pen.sy, 3, 0, 7); ctx.fill();

            // Tor mit Netz
            const lp = project(GOAL_L, 0), rp = project(GOAL_R, 0), goalH = 46;
            ctx.fillStyle = 'rgba(255,255,255,0.10)';
            ctx.beginPath();
            ctx.moveTo(lp.sx, lp.sy); ctx.lineTo(lp.sx, lp.sy - goalH); ctx.lineTo(rp.sx, rp.sy - goalH); ctx.lineTo(rp.sx, rp.sy); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let gx = lp.sx; gx <= rp.sx; gx += 12) { ctx.moveTo(gx, lp.sy); ctx.lineTo(gx, lp.sy - goalH); }
            for (let gy = 0; gy <= goalH; gy += 11) { ctx.moveTo(lp.sx, lp.sy - gy); ctx.lineTo(rp.sx, rp.sy - gy); }
            ctx.stroke();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(lp.sx, lp.sy); ctx.lineTo(lp.sx, lp.sy - goalH); ctx.lineTo(rp.sx, rp.sy - goalH); ctx.lineTo(rp.sx, rp.sy); ctx.stroke();

            // Figuren
            const drawKeeper = () => {
                const p = project(keeper.x, KEEPER_LINE); drawShadow(p); const s = p.sc;
                const ln = keeper.lean * 8 * s;   // Hechtneigung
                ctx.fillStyle = '#ff3b3b'; roundRect(p.sx - 11 * s + ln, p.sy - 30 * s, 22 * s, 22 * s, 4 * s);
                ctx.fillStyle = '#111'; ctx.fillRect(p.sx - 11 * s + ln, p.sy - 12 * s, 22 * s, 9 * s);
                ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(p.sx + ln, p.sy - 36 * s, 6 * s, 0, 7); ctx.fill();
                // Handschuhe strecken sich beim Hechten in die Flugrichtung
                ctx.fillStyle = '#fff'; const g = phase === 'shot' ? 19 : 13;
                ctx.beginPath();
                ctx.arc(p.sx - g * s + ln * 1.6, p.sy - 24 * s, 4.2 * s, 0, 7);
                ctx.arc(p.sx + g * s + ln * 1.6, p.sy - 24 * s, 4.2 * s, 0, 7);
                ctx.fill();
            };
            const drawPlayer = () => {
                const p = project(player.x, player.y); drawShadow(p);
                const s = p.sc, bob = Math.sin(player.run) * 2 * s;
                ctx.strokeStyle = 'rgba(56,224,106,0.9)'; ctx.lineWidth = 2.5 * s;
                ctx.beginPath(); ctx.ellipse(p.sx, p.sy, 13 * s, 6 * s, 0, 0, 7); ctx.stroke();
                ctx.fillStyle = '#f5f5f5'; roundRect(p.sx - 11 * s, p.sy - 30 * s + bob, 22 * s, 22 * s, 4 * s);
                ctx.fillStyle = '#0a2a6b'; ctx.fillRect(p.sx - 11 * s, p.sy - 12 * s + bob, 22 * s, 9 * s);
                ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(p.sx, p.sy - 36 * s + bob, 6 * s, 0, 7); ctx.fill();
                ctx.strokeStyle = '#38e06a'; ctx.lineWidth = 3 * s;
                ctx.beginPath(); ctx.moveTo(p.sx, p.sy); ctx.lineTo(p.sx + facing.x * 18 * s, p.sy + facing.y * 9 * s); ctx.stroke();
            };
            const drawBall = () => {
                const p = project(ball.x, ball.y);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(p.sx, p.sy + 2, 7 * p.sc, 3.5 * p.sc, 0, 0, 7); ctx.fill();
                ctx.save(); ctx.translate(p.sx, p.sy - 4 * p.sc); ctx.scale(p.sc, p.sc); ctx.rotate(ball.spinDraw);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, 0, 2.4, 0, 7); ctx.fill();
                for (let a = 0; a < 6.28; a += Math.PI / 2.5) ctx.fillRect(Math.cos(a) * 5 - 1.3, Math.sin(a) * 5 - 1.3, 2.6, 2.6);
                ctx.restore();
            };
            [{ y: KEEPER_LINE, f: drawKeeper }, { y: player.y, f: drawPlayer }, { y: ball.y, f: drawBall }]
                .sort((a, b) => a.y - b.y).forEach(i => i.f());

            drawControls();
        }

        function drawControls() {
            if (joy.active) {
                ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(joy.bx, joy.by, 70, 0, 7); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath(); ctx.arc(joy.bx + joy.dx * joy.mag * 70, joy.by + joy.dy * joy.mag * 70, 28, 0, 7); ctx.fill();
            }
            const canShoot = hasBall();
            ctx.fillStyle = canShoot ? 'rgba(56,224,106,0.9)' : 'rgba(120,120,120,0.4)';
            ctx.beginPath(); ctx.arc(shootBtn.x, shootBtn.y, shootBtn.r, 0, 7); ctx.fill();
            ctx.fillStyle = '#06110b'; ctx.font = 'bold 18px Segoe UI, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('SCHUSS', shootBtn.x, shootBtn.y);
            ctx.fillStyle = sprintHeld ? 'rgba(0,180,219,0.9)' : 'rgba(255,255,255,0.18)';
            ctx.beginPath(); ctx.arc(sprintBtn.x, sprintBtn.y, sprintBtn.r, 0, 7); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Segoe UI, sans-serif';
            ctx.fillText('SPRINT', sprintBtn.x, sprintBtn.y);
            ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        requestAnimationFrame(loop);

        // Debug-Hook fürs automatisierte Testen
        window.__game = { shoot: shoot, state: () => ({ phase: phase, score: score, attempts: attempts, ball: { x: ball.x, y: ball.y } }) };
    })();
    </script>
</body>
