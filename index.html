<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f0d">
    <meta name="description" content="Street Striker – dribble frei über den Platz und triff aus der Bewegung. FC-Mobile-artiges Web-Fußballspiel.">
    <title>Street Striker – Dribble & Score</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0; padding: 0;
            background: #06110b;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; min-height: 100dvh;
            color: #fff; overflow: hidden;
            user-select: none; -webkit-user-select: none;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        #wrap {
            position: relative;
            width: min(100vw, 600px);
            aspect-ratio: 600 / 800;
            max-height: 100dvh;
        }
        #gameCanvas {
            width: 100%; height: 100%; display: block;
            background: #0c2f14;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        #ui-layer {
            position: absolute; top: max(12px, env(safe-area-inset-top));
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10; pointer-events: none;
            width: 94%; justify-content: space-between;
        }
        #ui-layer { gap: 6px; }
        .hud-box {
            background: rgba(0,0,0,0.55);
            padding: 6px 10px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            font-weight: bold; font-size: 13px; letter-spacing: 0.5px; white-space: nowrap;
        }
        #score { color: #38e06a; }
        #best  { color: #ffcc00; }
        #popups {
            position: absolute; top: 34%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: clamp(34px, 10vw, 60px); font-weight: 900;
            text-shadow: 0 6px 18px rgba(0,0,0,0.9);
            pointer-events: none; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .show-popup { transform: translate(-50%,-50%) scale(1) !important; }
        #hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: rgba(255,255,255,0.55);
            z-index: 5; pointer-events: none; text-align: center; width: 90%;
            transition: opacity 0.5s ease;
        }
        #reopen {
            position: absolute; left: 10px; bottom: 62px; z-index: 11;
            background: rgba(0,0,0,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        #teamSelect {
            position: absolute; inset: 0; z-index: 200; display: flex;
            align-items: center; justify-content: center;
            background: rgba(4,10,7,0.86); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        .ts-card {
            width: 92%; max-width: 520px; padding: 20px;
            background: linear-gradient(160deg, #0e2a17, #0a1f13);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .ts-title { text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; }
        .ts-label { font-size: 12px; letter-spacing: 2px; color: #8fdcae; margin: 14px 0 8px; font-weight: bold; }
        .ts-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .ts-chip {
            display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 2px;
            background: rgba(255,255,255,0.06); border: 2px solid transparent; border-radius: 10px;
            cursor: pointer; color: #fff;
        }
        .ts-chip .fl { font-size: 24px; line-height: 1; }
        .ts-chip .cd { font-size: 11px; font-weight: bold; color: #cfe; }
        .ts-chip.sel { border-color: #38e06a; background: rgba(56,224,106,0.16); box-shadow: 0 0 12px rgba(56,224,106,0.3); }
        .ts-play {
            width: 100%; margin-top: 18px; padding: 15px; font-size: 18px; font-weight: 900; letter-spacing: 1px;
            color: #06110b; background: linear-gradient(145deg, #38e06a, #16b34a);
            border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 18px rgba(56,224,106,0.35);
        }
    </style>
</head>
<body>
    <div id="wrap">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="ui-layer">
            <div class="hud-box"><span id="flagYou">🇦🇷</span> TORE <span id="score">0</span></div>
            <div class="hud-box">BEST <span id="best">0</span></div>
            <div class="hud-box">SCHÜSSE <span id="attempts">0</span> <span id="flagOpp">🇪🇸</span></div>
        </div>
        <div id="popups">TOR!</div>
        <div id="hint">Linke Hälfte: Joystick zum Laufen & Dribbeln · Rechts: SCHUSS / SPRINT</div>
        <button id="reopen" type="button">⇄ Teams</button>
        <div id="teamSelect">
            <div class="ts-card">
                <div class="ts-title">⚽ LÄNDERSPIEL</div>
                <div class="ts-label">DEIN TEAM</div>
                <div class="ts-grid" id="grid-you"></div>
                <div class="ts-label">GEGNER (Torwart)</div>
                <div class="ts-grid" id="grid-opp"></div>
                <button id="ts-play" class="ts-play" type="button">SPIELEN ⚽</button>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        // ===== Canvas / Perspektive =====
        const CW = 600, CH = 800;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const attemptsEl = document.getElementById('attempts');
        const popup = document.getElementById('popups');
        const hint = document.getElementById('hint');

        function setupCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 3);
            canvas.width = Math.round(CW * dpr);
            canvas.height = Math.round(CH * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        setupCanvas();
        window.addEventListener('resize', setupCanvas);

        // Weltmaße: y=0 = Torlinie (fern/oben), y=FH = nah/unten
        const FW = 600, FH = 900;
        const TOP = 70;                 // Bildschirm-Rand oben (Ränge)
        const FIELD_H = CH - TOP;       // Feldhöhe am Screen
        const TOPHALF = 175, BOTHALF = 300; // halbe Feldbreite (Trapez) fern/nah
        const lerp = (a, b, t) => a + (b - a) * t;

        function project(wx, wy) {
            const t = wy / FH;
            const hw = lerp(TOPHALF, BOTHALF, t);
            return {
                sx: CW / 2 + (wx / FW - 0.5) * 2 * hw,
                sy: TOP + t * FIELD_H,
                sc: lerp(0.55, 1.18, t),
                t: t
            };
        }

        // Tor (Weltkoordinaten)
        const GOAL_L = 205, GOAL_R = 395, GOAL_CX = 300, KEEPER_LINE = 30;

        // ===== Zustand =====
        let score = 0, attempts = 0, best = 0;
        try { best = parseInt(localStorage.getItem('ss_best') || '0', 10) || 0; } catch (e) {}
        bestEl.textContent = best;

        let phase = 'play';   // 'play' (dribbeln) | 'shot' | 'result'

        const KSPEED = 5.2;   // max. horizontales Tempo des Torwarts
        const KREACH = 34;    // Reichweite (Hände) beim Hechten
        let player, ball, keeper, facing;
        function reset() {
            player = { x: 300, y: 720, run: 0, vx: 0, vy: 0 };
            ball = { x: 320, y: 700, vx: 0, vy: 0, spin: 0, spinDraw: 0 };
            keeper = { x: GOAL_CX, dive: GOAL_CX, diving: false, react: 0, lean: 0 };
            facing = { x: 0, y: -1 };
            phase = 'play';
        }
        reset();

        // ===== Nationalteams / Trikots (Kits) =====
        const TEAMS = {
            ARG: { flag: '🇦🇷', name: 'Argentinien', kit: { type: 'stripes', c1: '#6cb0e4', c2: '#ffffff', shorts: '#122647', socks: '#ffffff' } },
            ESP: { flag: '🇪🇸', name: 'Spanien', kit: { type: 'solid', c1: '#c60b1e', c2: '#c60b1e', shorts: '#1b2a5b', socks: '#12204a' } },
            GER: { flag: '🇩🇪', name: 'Deutschland', kit: { type: 'solid', c1: '#f4f4f4', c2: '#f4f4f4', shorts: '#141414', socks: '#f4f4f4' } },
            BRA: { flag: '🇧🇷', name: 'Brasilien', kit: { type: 'solid', c1: '#ffdf00', c2: '#ffdf00', shorts: '#0b3aa0', socks: '#ffffff' } },
            FRA: { flag: '🇫🇷', name: 'Frankreich', kit: { type: 'solid', c1: '#20408a', c2: '#20408a', shorts: '#ffffff', socks: '#c8102e' } },
            ENG: { flag: '🇬🇧', name: 'England', kit: { type: 'solid', c1: '#f4f4f4', c2: '#f4f4f4', shorts: '#0a1f44', socks: '#f4f4f4' } },
            ITA: { flag: '🇮🇹', name: 'Italien', kit: { type: 'solid', c1: '#1c50a1', c2: '#1c50a1', shorts: '#ffffff', socks: '#1c50a1' } },
            NED: { flag: '🇳🇱', name: 'Niederlande', kit: { type: 'solid', c1: '#ff6a00', c2: '#ff6a00', shorts: '#141414', socks: '#ff6a00' } },
            POR: { flag: '🇵🇹', name: 'Portugal', kit: { type: 'solid', c1: '#a50021', c2: '#a50021', shorts: '#1b6b25', socks: '#a50021' } }
        };
        let kitYou = TEAMS.ARG.kit, kitOpp = TEAMS.ESP.kit;
        let paused = true;   // bis Team gewählt

        // ===== vorberechnete Ränge =====
        const crowd = [];
        for (let i = 0; i < CW; i += 10) crowd.push({ x: i, c: ((i * 2654435761) >>> 9) % 3 });
        const crowdCols = ['#12202b', '#1a2b1f', '#241a24'];
        let flashes = [];

        // ===== Sound =====
        let ac = null;
        function initAudio() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
        function tone(f, d, type, v, to) {
            if (!ac) return;
            const t = ac.currentTime, o = ac.createOscillator(), g = ac.createGain();
            o.type = type || 'sine'; o.frequency.setValueAtTime(f, t);
            if (to) o.frequency.exponentialRampToValueAtTime(to, t + d);
            g.gain.setValueAtTime(v || 0.2, t); g.gain.exponentialRampToValueAtTime(0.0001, t + d);
            o.connect(g).connect(ac.destination); o.start(t); o.stop(t + d);
        }
        const sfx = {
            kick: () => tone(190, 0.11, 'triangle', 0.32, 95),
            goal: () => { tone(523, 0.14, 'square', 0.22); setTimeout(() => tone(784, 0.24, 'square', 0.22), 110); },
            save: () => tone(300, 0.18, 'sawtooth', 0.2, 150),
            miss: () => tone(210, 0.28, 'sine', 0.2, 110)
        };

        // ===== Eingaben (Tastatur für Desktop/Test) =====
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') { e.preventDefault(); shoot(); }
        });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // ===== Touch: floating Joystick (links) + Buttons (rechts) =====
        let joy = { active: false, id: null, bx: 0, by: 0, dx: 0, dy: 0, mag: 0 };
        let sprintHeld = false;
        const shootBtn = { x: CW - 92, y: CH - 96, r: 58 };
        const sprintBtn = { x: CW - 150, y: CH - 210, r: 42, id: null };

        function toLocal(t) {
            const r = canvas.getBoundingClientRect();
            return { x: (t.clientX - r.left) / r.width * CW, y: (t.clientY - r.top) / r.height * CH };
        }
        function inBtn(p, b) { return Math.hypot(p.x - b.x, p.y - b.y) <= b.r; }

        canvas.addEventListener('touchstart', e => {
            initAudio();
            for (const t of e.changedTouches) {
                const p = toLocal(t);
                if (inBtn(p, shootBtn)) { shoot(); continue; }
                if (inBtn(p, sprintBtn)) { sprintHeld = true; sprintBtn.id = t.identifier; continue; }
                if (!joy.active && p.x < CW * 0.58) {
                    joy.active = true; joy.id = t.identifier; joy.bx = p.x; joy.by = p.y; joy.dx = 0; joy.dy = 0; joy.mag = 0;
                }
            }
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            for (const t of e.changedTouches) {
                if (t.identifier === joy.id) {
                    const p = toLocal(t);
                    let dx = p.x - joy.bx, dy = p.y - joy.by;
                    const d = Math.hypot(dx, dy), R = 70;
                    joy.mag = Math.min(1, d / R);
                    if (d > 0) { joy.dx = dx / d; joy.dy = dy / d; }
                }
            }
            e.preventDefault();
        }, { passive: false });

        function endTouch(e) {
            for (const t of e.changedTouches) {
                if (t.identifier === joy.id) { joy.active = false; joy.id = null; joy.mag = 0; joy.dx = 0; joy.dy = 0; }
                if (t.identifier === sprintBtn.id) { sprintHeld = false; sprintBtn.id = null; }
            }
        }
        canvas.addEventListener('touchend', endTouch);
        canvas.addEventListener('touchcancel', endTouch);
        canvas.addEventListener('mousedown', e => { initAudio(); const p = toLocal(e); if (inBtn(p, shootBtn)) shoot(); });

        function inputVector() {
            if (joy.active && joy.mag > 0.08) return { x: joy.dx, y: joy.dy, mag: joy.mag };
            let x = 0, y = 0;
            if (keys['arrowleft'] || keys['a']) x -= 1;
            if (keys['arrowright'] || keys['d']) x += 1;
            if (keys['arrowup'] || keys['w']) y -= 1;
            if (keys['arrowdown'] || keys['s']) y += 1;
            const d = Math.hypot(x, y);
            if (d > 0) return { x: x / d, y: y / d, mag: 1 };
            return { x: 0, y: 0, mag: 0 };
        }

        function hasBall() {
            return phase === 'play' && Math.hypot(player.x - ball.x, player.y - ball.y) < 46;
        }

        function shoot() {
            initAudio();
            if (paused || phase !== 'play' || !hasBall()) return;
            phase = 'shot';
            attempts++; attemptsEl.textContent = attempts;
            hint.style.opacity = '0';

            const iv = inputVector();
            const aimX = Math.max(GOAL_L + 6, Math.min(GOAL_R - 6, GOAL_CX + iv.x * 74));
            let dx = aimX - ball.x, dy = 0 - ball.y;
            const d = Math.hypot(dx, dy) || 1;
            const SPEED = 14;
            ball.vx = dx / d * SPEED;
            ball.vy = dy / d * SPEED;
            ball.spin = iv.x * 0.08;

            // Torwart liest den Schuss und legt sich auf eine Ecke fest
            // (wie in echt). Trifft er die Ecke -> Parade; platzierst du in die
            // andere Ecke -> Tor. Reaktionszeit + Tempolimit machen ihn zusätzlich
            // aus spitzem Winkel schlagbar.
            const tHit = (ball.y - KEEPER_LINE) / (-ball.vy);
            const predX = ball.x + ball.vx * tHit;
            const err = (((attempts * 2654435761) >>> 12) % 100) - 50;   // ±50 Leseungenauigkeit
            keeper.dive = Math.max(GOAL_L - 14, Math.min(GOAL_R + 14, predX + err));
            keeper.diving = true;
            keeper.react = 6;   // Frames Reaktionszeit
            sfx.kick();
        }

        // ===== Update =====
        function update() {
            if (paused) return;
            const iv = inputVector();

            if (phase === 'play') {
                // Spieler mit Trägheit/Momentum (beschleunigt & gleitet)
                const sprint = (sprintHeld || keys['shift']) ? 1.62 : 1;
                const maxSp = 4.3 * sprint * iv.mag;
                const tvx = iv.x * maxSp, tvy = iv.y * maxSp;
                player.vx += (tvx - player.vx) * 0.16;
                player.vy += (tvy - player.vy) * 0.16;
                player.x += player.vx; player.y += player.vy;
                const spd = Math.hypot(player.vx, player.vy);
                if (spd > 0.35) { facing.x = player.vx / spd; facing.y = player.vy / spd; player.run += spd * 0.13; }
                player.x = Math.max(24, Math.min(FW - 24, player.x));
                player.y = Math.max(KEEPER_LINE + 20, Math.min(FH - 24, player.y));

                // Dribbling mit losem Kontakt: bei Tempo wird der Ball weiter
                // vorgelegt (schwerer zu kontrollieren). Ball hat eigene Reibung.
                const DR = 22 + spd * 3.2;
                const grip = spd > 6 ? 0.22 : 0.3;
                ball.vx += ((player.x + facing.x * DR) - ball.x) * grip;
                ball.vy += ((player.y + facing.y * DR) - ball.y) * grip;
                ball.vx *= 0.55; ball.vy *= 0.55;   // Dämpfung -> weiches Führen
                ball.x += ball.vx; ball.y += ball.vy;
                ball.spinDraw += spd * 0.08 + 0.05;

                // Torwart hält aktiv die Winkel, spiegelt Ballposition gedämpft
                const idle = GOAL_CX + Math.sin(player.run * 0.08 + attempts) * 40;
                const target = Math.max(GOAL_L + 12, Math.min(GOAL_R - 12, ball.x * 0.34 + idle * 0.66));
                keeper.x += (target - keeper.x) * 0.07;
                keeper.lean *= 0.85;
            } else if (phase === 'shot') {
                // Ballflug: Kurve (Magnus), Luft-/Rollreibung
                ball.vx += ball.spin * 0.14; ball.spin *= 0.98;
                ball.vx *= 0.992; ball.vy *= 0.992;
                ball.x += ball.vx; ball.y += ball.vy;
                ball.spinDraw += 0.42;

                // Torwart hechtet zur festgelegten Ecke – begrenzt durch sein Tempo
                if (keeper.react > 0) { keeper.react--; }
                else {
                    const dxk = keeper.dive - keeper.x;
                    const step = Math.max(-KSPEED, Math.min(KSPEED, dxk));
                    keeper.x += step;
                    keeper.lean += (Math.sign(dxk) - keeper.lean) * 0.2;
                }

                if (ball.y <= 44 && ball.y > 0 && Math.abs(ball.x - keeper.x) < KREACH) resolve('GEHALTEN!', '#ff9800', 'save');
                else if (ball.y <= 4) {
                    if (ball.x > GOAL_L && ball.x < GOAL_R) resolve('TOR!', '#38e06a', 'goal');
                    else resolve('VORBEI!', '#bbb', 'miss');
                } else if (ball.x < -20 || ball.x > FW + 20) resolve('VORBEI!', '#bbb', 'miss');
            }

            if (Math.random() > 0.9) flashes.push({ x: Math.random() * CW, life: 1 });
            for (let i = flashes.length - 1; i >= 0; i--) { flashes[i].life -= 0.06; if (flashes[i].life <= 0) flashes.splice(i, 1); }
        }

        function resolve(text, color, kind) {
            if (phase === 'result') return;
            phase = 'result';
            popup.textContent = text; popup.style.color = color; popup.classList.add('show-popup');
            if (sfx[kind]) sfx[kind]();
            if (kind === 'goal') {
                score++;
                if (score > best) { best = score; bestEl.textContent = best; try { localStorage.setItem('ss_best', String(best)); } catch (e) {} }
            } else { score = 0; }
            scoreEl.textContent = score;
            setTimeout(() => { popup.classList.remove('show-popup'); reset(); }, 1400);
        }

        // ===== Rendering =====
        function pitchX(t, side) { return CW / 2 + side * lerp(TOPHALF, BOTHALF, t); }

        // Gecachte Licht-/Schattenverläufe (einmalig)
        const standsGrad = ctx.createLinearGradient(0, 0, 0, TOP);
        standsGrad.addColorStop(0, '#0b1a12'); standsGrad.addColorStop(1, '#04100a');
        const pitchLight = ctx.createRadialGradient(CW / 2, CH * 0.72, 40, CW / 2, CH * 0.5, CH * 0.95);
        pitchLight.addColorStop(0, 'rgba(255,255,255,0.10)'); pitchLight.addColorStop(1, 'rgba(255,255,255,0)');
        const vignette = ctx.createRadialGradient(CW / 2, CH * 0.55, CH * 0.35, CW / 2, CH * 0.55, CH * 0.85);
        vignette.addColorStop(0, 'rgba(0,0,0,0)'); vignette.addColorStop(1, 'rgba(0,0,0,0.45)');

        function rrPath(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
        }
        function roundRect(x, y, w, h, r) { rrPath(x, y, w, h, r); ctx.fill(); }
        function softShadow(sx, sy, rx, ry, a) {
            const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, rx);
            g.addColorStop(0, 'rgba(0,0,0,' + a + ')'); g.addColorStop(0.7, 'rgba(0,0,0,' + a * 0.7 + ')'); g.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = g;
            ctx.save(); ctx.translate(sx, sy); ctx.scale(1, ry / rx);
            ctx.beginPath(); ctx.arc(0, 0, rx, 0, 7); ctx.fill(); ctx.restore();
        }

        // Farbe abdunkeln (für Verläufe) + Helligkeit bestimmen
        function shade(hex, f) {
            const n = parseInt(hex.slice(1), 16);
            let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
            r = Math.min(255, Math.round(r * f)); g = Math.min(255, Math.round(g * f)); b = Math.min(255, Math.round(b * f));
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }
        function lum(hex) { const n = parseInt(hex.slice(1), 16); return (0.299 * ((n >> 16) & 255) + 0.587 * ((n >> 8) & 255) + 0.114 * (n & 255)) / 255; }

        // Detaillierte, schattierte Spielfigur mit Nationaltrikot (Kit)
        function drawPerson(sx, sy, s, o) {
            const kit = o.kit;
            const lean = (o.lean || 0) * 9 * s;
            const run = o.run || 0, moving = o.moving;
            softShadow(sx + lean * 0.5, sy + 2 * s, 15 * s, 6 * s, 0.34);

            // Beine mit Schrittanimation (Stutzen in Trikotfarbe)
            for (const sign of [-1, 1]) {
                const sw = moving ? Math.sin(run + (sign > 0 ? 0 : Math.PI)) * 6 * s : 0;
                const hipX = sx + sign * 4 * s + lean, hipY = sy - 13 * s;
                const footX = sx + sign * 4.5 * s + sw + lean, footY = sy - Math.max(0, sw) * 0.15;
                ctx.strokeStyle = o.skin; ctx.lineWidth = 5 * s; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(hipX, hipY); ctx.lineTo(footX, footY); ctx.stroke();
                ctx.strokeStyle = kit.socks; ctx.lineWidth = 5 * s;
                ctx.beginPath(); ctx.moveTo(footX + (hipX - footX) * 0.35, footY + (hipY - footY) * 0.35); ctx.lineTo(footX, footY); ctx.stroke();
                ctx.fillStyle = '#151515'; ctx.beginPath(); ctx.ellipse(footX + sign * 1.5 * s, footY, 4 * s, 2.4 * s, 0, 0, 7); ctx.fill();
            }

            // Arme
            const shY = sy - 30 * s;
            for (const sign of [-1, 1]) {
                let ax = sx + sign * 11 * s + lean, ay = sy - 16 * s;
                if (o.gloves && o.phaseShot) { ax = sx + sign * 17 * s + lean * 1.4; ay = sy - 24 * s; }
                else { const aw = moving ? Math.sin(run + (sign > 0 ? Math.PI : 0)) * 4 * s : 0; ax += aw; }
                ctx.strokeStyle = o.skin; ctx.lineWidth = 3.6 * s; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(sx + sign * 8 * s + lean, shY + 3 * s); ctx.lineTo(ax, ay); ctx.stroke();
                if (o.gloves) { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ax, ay, 4.2 * s, 0, 7); ctx.fill(); }
            }

            // Torso – Trikot (Streifen oder unifarben)
            const tx = sx - 10 * s + lean, tw = 20 * s, ty = shY, th = 19 * s;
            if (kit.type === 'stripes') {
                ctx.fillStyle = kit.c2; rrPath(tx, ty, tw, th, 5 * s); ctx.fill();
                ctx.save(); rrPath(tx, ty, tw, th, 5 * s); ctx.clip();
                ctx.fillStyle = kit.c1;
                const sw2 = tw / 7;
                for (let k = 1; k < 7; k += 2) ctx.fillRect(tx + k * sw2, ty, sw2, th);
                ctx.restore();
            } else {
                const g = ctx.createLinearGradient(tx, ty, tx, ty + th);
                g.addColorStop(0, kit.c1); g.addColorStop(1, shade(kit.c1, 0.78));
                ctx.fillStyle = g; rrPath(tx, ty, tw, th, 5 * s); ctx.fill();
            }
            // Seitenschattierung + Ärmel
            ctx.fillStyle = 'rgba(0,0,0,0.14)'; rrPath(tx + tw * 0.64, ty, tw * 0.36, th, 5 * s); ctx.fill();
            ctx.fillStyle = shade(kit.c1, 0.9);
            rrPath(tx - 3 * s, ty + 1 * s, 5 * s, 8 * s, 2 * s); ctx.fill();
            rrPath(tx + tw - 2 * s, ty + 1 * s, 5 * s, 8 * s, 2 * s); ctx.fill();
            // Hose
            ctx.fillStyle = kit.shorts; rrPath(sx - 9 * s + lean, sy - 15 * s, 18 * s, 8 * s, 3 * s); ctx.fill();
            // Rückennummer (Kontrastfarbe)
            if (o.num) {
                const base = kit.type === 'stripes' ? kit.c2 : kit.c1;
                ctx.fillStyle = lum(base) > 0.6 ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.85)';
                ctx.font = 'bold ' + (9 * s) + 'px Segoe UI, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(o.num, sx + lean, ty + th * 0.48); ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
            }

            // Kopf mit Haaren
            const hx = sx + lean, hy = sy - 41 * s, hr = 6.5 * s;
            ctx.fillStyle = o.skin; ctx.beginPath(); ctx.arc(hx, hy, hr, 0, 7); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.arc(hx + 1.6 * s, hy + 0.6 * s, hr, Math.PI * -0.35, Math.PI * 0.55); ctx.fill();
            ctx.fillStyle = o.hair; ctx.beginPath(); ctx.arc(hx, hy - 1 * s, hr, Math.PI * 1.05, Math.PI * 1.95); ctx.fill();
        }

        // 3D-schattierter Ball
        function drawBallSprite(p, spin) {
            const s = p.sc, R = 8.5 * s;
            softShadow(p.sx + 3 * s, p.sy + 3 * s, 8 * s, 3.5 * s, 0.3);
            const cx = p.sx, cy = p.sy - 5 * s;
            const g = ctx.createRadialGradient(cx - R * 0.35, cy - R * 0.4, R * 0.15, cx, cy, R);
            g.addColorStop(0, '#ffffff'); g.addColorStop(0.65, '#e8e8e8'); g.addColorStop(1, '#9aa0a4');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.fill();
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(spin);
            ctx.fillStyle = 'rgba(20,20,20,0.9)'; ctx.beginPath(); ctx.arc(0, 0, R * 0.32, 0, 7); ctx.fill();
            for (let a = 0; a < 6.28; a += Math.PI / 2.5) {
                ctx.save(); ctx.rotate(a); ctx.translate(0, R * 0.62);
                ctx.fillStyle = 'rgba(20,20,20,0.85)'; ctx.beginPath(); ctx.arc(0, 0, R * 0.16, 0, 7); ctx.fill(); ctx.restore();
            }
            ctx.restore();
            ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(cx, cy, R, 0, 7); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(cx - R * 0.35, cy - R * 0.4, R * 0.22, 0, 7); ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, CW, CH);

            // ===== Ränge / Stadion =====
            ctx.fillStyle = standsGrad; ctx.fillRect(0, 0, CW, TOP);
            for (let r = 0; r < 4; r++) {
                const yy = 12 + r * (TOP - 20) / 4;
                for (let i = 0; i < crowd.length; i++) {
                    ctx.fillStyle = crowdCols[(crowd[i].c + r) % 3];
                    ctx.fillRect(crowd[i].x, yy, 8, (TOP - 22) / 4 - 1.5);
                }
            }
            // Flutlicht-Glow oben in den Ecken
            for (const fx of [CW * 0.18, CW * 0.82]) {
                const fg = ctx.createRadialGradient(fx, 4, 2, fx, 4, 70);
                fg.addColorStop(0, 'rgba(220,235,255,0.5)'); fg.addColorStop(1, 'rgba(220,235,255,0)');
                ctx.fillStyle = fg; ctx.fillRect(fx - 70, 0, 140, 90);
            }
            for (let i = 0; i < flashes.length; i++) { ctx.fillStyle = 'rgba(255,255,255,' + flashes[i].life * 0.85 + ')'; ctx.beginPath(); ctx.arc(flashes[i].x, 20 + (flashes[i].x % 3) * 12, 2.5, 0, 7); ctx.fill(); }

            // ===== Rasen mit Mäh-Streifen (leichter Verlauf je Bahn) =====
            const bands = 12;
            for (let b = 0; b < bands; b++) {
                const t0 = b / bands, t1 = (b + 1) / bands;
                const y0 = TOP + t0 * FIELD_H, y1 = TOP + t1 * FIELD_H;
                const bg = ctx.createLinearGradient(0, y0, 0, y1);
                if (b % 2 === 0) { bg.addColorStop(0, '#1f7a2b'); bg.addColorStop(1, '#1c6e27'); }
                else { bg.addColorStop(0, '#186423'); bg.addColorStop(1, '#15591f'); }
                ctx.fillStyle = bg;
                ctx.beginPath();
                ctx.moveTo(pitchX(t0, -1), y0); ctx.lineTo(pitchX(t0, 1), y0);
                ctx.lineTo(pitchX(t1, 1), y1); ctx.lineTo(pitchX(t1, -1), y1); ctx.closePath(); ctx.fill();
            }
            // Lichtkegel auf dem Platz
            ctx.fillStyle = pitchLight; ctx.fillRect(0, TOP, CW, FIELD_H);

            // ===== Linien (mit dezentem Glow) =====
            ctx.save();
            ctx.shadowColor = 'rgba(255,255,255,0.4)'; ctx.shadowBlur = 4;
            ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(pitchX(0, -1), TOP); ctx.lineTo(pitchX(1, -1), CH);
            ctx.moveTo(pitchX(0, 1), TOP); ctx.lineTo(pitchX(1, 1), CH);
            ctx.moveTo(pitchX(0, -1), TOP); ctx.lineTo(pitchX(0, 1), TOP);
            ctx.stroke();
            // Strafraum + Fünfer
            const bl0 = project(150, 0), br0 = project(450, 0), bl1 = project(150, 260), br1 = project(450, 260);
            ctx.lineWidth = 2.4;
            ctx.beginPath(); ctx.moveTo(bl0.sx, bl0.sy); ctx.lineTo(bl1.sx, bl1.sy); ctx.lineTo(br1.sx, br1.sy); ctx.lineTo(br0.sx, br0.sy); ctx.stroke();
            const fl0 = project(240, 0), fr0 = project(360, 0), fl1 = project(240, 95), fr1 = project(360, 95);
            ctx.beginPath(); ctx.moveTo(fl0.sx, fl0.sy); ctx.lineTo(fl1.sx, fl1.sy); ctx.lineTo(fr1.sx, fr1.sy); ctx.lineTo(fr0.sx, fr0.sy); ctx.stroke();
            // Strafraumbogen (D)
            const pen = project(300, 180);
            const arcRx = project(370, 180).sx - pen.sx, arcRy = project(300, 250).sy - pen.sy;
            ctx.beginPath(); ctx.ellipse(pen.sx, pen.sy, arcRx, arcRy, 0, Math.PI * 0.12, Math.PI * 0.88); ctx.stroke();
            // Eckbögen
            const cl = project(0, 0), cr = project(600, 0);
            ctx.beginPath(); ctx.ellipse(cl.sx, cl.sy, 10, 5, 0, Math.PI * 1.5, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(cr.sx, cr.sy, 10, 5, 0, Math.PI, Math.PI * 1.5); ctx.stroke();
            ctx.restore();
            // Elfmeterpunkt
            ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.beginPath(); ctx.arc(pen.sx, pen.sy, 2.6, 0, 7); ctx.fill();

            // ===== Tor mit Tiefe & plastischen Pfosten =====
            const lp = project(GOAL_L, 0), rp = project(GOAL_R, 0), goalH = 50, depth = 14;
            // hinterer Netzrahmen (Tiefe)
            const blx = lp.sx - depth, brx = rp.sx + depth, backTop = lp.sy - goalH - 10;
            ctx.fillStyle = 'rgba(230,240,255,0.06)';
            ctx.beginPath(); ctx.moveTo(lp.sx, lp.sy); ctx.lineTo(lp.sx, lp.sy - goalH); ctx.lineTo(rp.sx, rp.sy - goalH); ctx.lineTo(rp.sx, rp.sy); ctx.closePath(); ctx.fill();
            // Netz: Rauten
            ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let gx = lp.sx; gx <= rp.sx + 1; gx += 10) { ctx.moveTo(gx, lp.sy); ctx.lineTo(gx - depth * 0.5, lp.sy - goalH); }
            for (let gy = 0; gy <= goalH; gy += 9) { const yy = lp.sy - gy; ctx.moveTo(lp.sx, yy); ctx.lineTo(rp.sx, yy); }
            ctx.stroke();
            // Pfosten & Latte (Verlauf für Plastizität)
            const postW = 5 * lp.sc;
            function post(x) {
                const pg = ctx.createLinearGradient(x - postW / 2, 0, x + postW / 2, 0);
                pg.addColorStop(0, '#ffffff'); pg.addColorStop(0.5, '#e2e2e2'); pg.addColorStop(1, '#b8b8b8');
                ctx.fillStyle = pg; rrPath(x - postW / 2, lp.sy - goalH, postW, goalH, postW / 2); ctx.fill();
            }
            post(lp.sx); post(rp.sx);
            const cg = ctx.createLinearGradient(0, lp.sy - goalH - postW, 0, lp.sy - goalH + postW);
            cg.addColorStop(0, '#ffffff'); cg.addColorStop(1, '#c4c4c4');
            ctx.fillStyle = cg; rrPath(lp.sx - postW / 2, lp.sy - goalH - postW / 2, (rp.sx - lp.sx) + postW, postW, postW / 2); ctx.fill();

            // ===== Figuren (nach Tiefe sortiert) =====
            const drawKeeper = () => {
                const p = project(keeper.x, KEEPER_LINE);
                drawPerson(p.sx, p.sy, p.sc, {
                    kit: kitOpp, skin: '#e8b98f', hair: '#241611',
                    run: player.run * 0.25, moving: false,
                    lean: keeper.lean, gloves: true, phaseShot: phase === 'shot', num: '1'
                });
            };
            const drawPlayer = () => {
                const p = project(player.x, player.y), s = p.sc;
                const spd = Math.hypot(player.vx, player.vy);
                ctx.strokeStyle = 'rgba(56,224,106,0.8)'; ctx.lineWidth = 2 * s;
                ctx.beginPath(); ctx.ellipse(p.sx, p.sy, 12 * s, 5 * s, 0, 0, 7); ctx.stroke();
                drawPerson(p.sx, p.sy, s, {
                    kit: kitYou, skin: '#e8b98f', hair: '#3a2a1a',
                    run: player.run, moving: spd > 0.4, lean: 0, num: '10'
                });
            };
            const drawBall = () => { drawBallSprite(project(ball.x, ball.y), ball.spinDraw); };
            [{ y: KEEPER_LINE, f: drawKeeper }, { y: player.y, f: drawPlayer }, { y: ball.y, f: drawBall }]
                .sort((a, b) => a.y - b.y).forEach(i => i.f());

            // Vignette über die Szene (Controls kommen darüber)
            ctx.fillStyle = vignette; ctx.fillRect(0, 0, CW, CH);

            drawControls();
        }

        function drawControls() {
            if (joy.active) {
                ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(joy.bx, joy.by, 70, 0, 7); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath(); ctx.arc(joy.bx + joy.dx * joy.mag * 70, joy.by + joy.dy * joy.mag * 70, 28, 0, 7); ctx.fill();
            }
            const canShoot = hasBall();
            ctx.fillStyle = canShoot ? 'rgba(56,224,106,0.9)' : 'rgba(120,120,120,0.4)';
            ctx.beginPath(); ctx.arc(shootBtn.x, shootBtn.y, shootBtn.r, 0, 7); ctx.fill();
            ctx.fillStyle = '#06110b'; ctx.font = 'bold 18px Segoe UI, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('SCHUSS', shootBtn.x, shootBtn.y);
            ctx.fillStyle = sprintHeld ? 'rgba(0,180,219,0.9)' : 'rgba(255,255,255,0.18)';
            ctx.beginPath(); ctx.arc(sprintBtn.x, sprintBtn.y, sprintBtn.r, 0, 7); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Segoe UI, sans-serif';
            ctx.fillText('SPRINT', sprintBtn.x, sprintBtn.y);
            ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
        }

        // ===== Team-Auswahl (DOM-Overlay) =====
        (function teamUI() {
            const gy = document.getElementById('grid-you'), go = document.getElementById('grid-opp');
            const overlay = document.getElementById('teamSelect');
            const flagYou = document.getElementById('flagYou'), flagOpp = document.getElementById('flagOpp');
            let selYou = 'ARG', selOpp = 'ESP';
            try { selYou = localStorage.getItem('ss_you') || 'ARG'; selOpp = localStorage.getItem('ss_opp') || 'ESP'; } catch (e) {}
            if (!TEAMS[selYou]) selYou = 'ARG';
            if (!TEAMS[selOpp]) selOpp = 'ESP';
            function render() {
                [[gy, () => selYou, c => { selYou = c; }], [go, () => selOpp, c => { selOpp = c; }]].forEach(function (cfg) {
                    const grid = cfg[0], get = cfg[1], set = cfg[2];
                    grid.innerHTML = '';
                    Object.keys(TEAMS).forEach(function (code) {
                        const b = document.createElement('button');
                        b.type = 'button';
                        b.className = 'ts-chip' + (code === get() ? ' sel' : '');
                        b.innerHTML = '<span class="fl">' + TEAMS[code].flag + '</span><span class="cd">' + code + '</span>';
                        b.onclick = function () { set(code); render(); };
                        grid.appendChild(b);
                    });
                });
                flagYou.textContent = TEAMS[selYou].flag;
                flagOpp.textContent = TEAMS[selOpp].flag;
            }
            function apply() { kitYou = TEAMS[selYou].kit; kitOpp = TEAMS[selOpp].kit; }
            apply(); render();
            document.getElementById('ts-play').onclick = function () {
                apply();
                try { localStorage.setItem('ss_you', selYou); localStorage.setItem('ss_opp', selOpp); } catch (e) {}
                overlay.style.display = 'none'; paused = false; reset(); initAudio();
            };
            document.getElementById('reopen').onclick = function () { paused = true; overlay.style.display = 'flex'; };
        })();

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        requestAnimationFrame(loop);

        // Debug-Hook fürs automatisierte Testen
        window.__game = { shoot: shoot, state: () => ({ phase: phase, score: score, attempts: attempts, ball: { x: ball.x, y: ball.y } }) };
    })();
    </script>
</body>
